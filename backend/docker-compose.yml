version: "3.9"

services:
  engage:
    build: .
    container_name: social-engage
    restart: unless-stopped
    ports:
      - "8097:8096"
    env_file:
      - .env
    volumes:
      - engage_data:/app/sessions
      - engage_db:/app/data
    environment:
      - DB_PATH=/app/data/engage.db

volumes:
  engage_data:
  engage_db:
